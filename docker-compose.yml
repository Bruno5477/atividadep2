services:
  api:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://bo_mangas:bo_mangas@db:5432/bo_mangas}
      SECRET_KEY: ${SECRET_KEY:-dev-secret}
      PORT: ${PORT:-8000}
      PYTHONPATH: /app
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bo_mangas
      POSTGRES_USER: bo_mangas
      POSTGRES_PASSWORD: bo_mangas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bo_mangas -d bo_mangas"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
